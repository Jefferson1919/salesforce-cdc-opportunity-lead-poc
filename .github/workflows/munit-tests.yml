name: MUnit Tests

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
      - 'feature/**'
  pull_request:
    branches:
      - main
      - master

jobs:
  munit:
    name: Run MUnit 3.7 Tests
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout do código
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Configurar Java 17
      # ----------------------------------------------------------------
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ----------------------------------------------------------------
      # 3. Configurar Maven settings.xml com credenciais Anypoint
      #    Secrets necessários no repositório GitHub:
      #      - ANYPOINT_USERNAME  (ex: seu e-mail Anypoint)
      #      - ANYPOINT_PASSWORD  (ex: sua senha ou token Anypoint)
      # ----------------------------------------------------------------
      - name: Configure Maven settings (Anypoint credentials)
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: >
            [
              {
                "id": "anypoint-exchange-v3",
                "username": "${{ secrets.ANYPOINT_USERNAME }}",
                "password": "${{ secrets.ANYPOINT_PASSWORD }}"
              },
              {
                "id": "mulesoft-releases",
                "username": "${{ secrets.ANYPOINT_USERNAME }}",
                "password": "${{ secrets.ANYPOINT_PASSWORD }}"
              }
            ]

      # ----------------------------------------------------------------
      # 4. Executar testes MUnit
      # ----------------------------------------------------------------
      - name: Run MUnit tests
        run: mvn test --no-transfer-progress
        env:
          # Sobrescreve a organization.id do pom.xml via property
          # (necessário pois o pom usa ${organization.id} no groupId)
          MAVEN_OPTS: "-Dorganization.id=${{ secrets.ANYPOINT_ORG_ID || '333fb396-9e6e-4ce9-b6fc-bb6a448415bd' }}"

      # ----------------------------------------------------------------
      # 5. Publicar relatório de cobertura HTML como artefato
      # ----------------------------------------------------------------
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: munit-coverage-report
          path: target/site/munit/coverage/
          retention-days: 30

      # ----------------------------------------------------------------
      # 6. Publicar resultados dos testes (JUnit XML → GitHub Check)
      # ----------------------------------------------------------------
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: target/surefire-reports/*.xml
          check_name: MUnit Test Results
          fail_on_failure: true
